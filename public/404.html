<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>sharemood</title>
    <script>
      // GitHub Pages SPA 리다이렉트 처리
      // /my-community/explore → /?p=/explore 로 인코딩해서 index.html로 전달
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1)) + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
  </head>
  <body></body>
</html>
