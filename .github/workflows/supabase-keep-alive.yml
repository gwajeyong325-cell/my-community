name: Supabase Keep Alive

on:
  schedule:
    # 주 3회 실행 (월, 수, 금 오전 9시 UTC = 오후 6시 KST)
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (posts 테이블)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/posts?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase ping successful!"
          else
            echo "Ping failed with status $STATUS" && exit 1
          fi
